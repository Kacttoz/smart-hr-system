{% extends 'base.html' %}

{% block title %}Generate Offer Letter{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto bg-white p-8 rounded-lg shadow-md">
    <h2 class="text-2xl font-bold mb-6 text-gray-800">Generate New Offer Letter</h2>

    <form method="post" class="space-y-6">
        {% csrf_token %}

        <div class="grid grid-cols-1 gap-y-6 gap-x-4 sm:grid-cols-6">
            <div class="sm:col-span-2">
                <label for="gender" class="block text-sm font-medium text-gray-700">Gender</label>
                <div class="mt-1">
                    <select id="gender" name="gender" required
                        class="block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm">
                        <option value="Male">Male</option>
                        <option value="Female">Female</option>
                    </select>
                </div>
            </div>

            <div class="sm:col-span-4">
                <label for="candidate_name" class="block text-sm font-medium text-gray-700">Candidate Full Name</label>
                <div class="mt-1">
                    <input type="text" name="candidate_name" id="candidate_name" required
                        class="block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm">
                </div>
            </div>

            <div class="sm:col-span-4">
                <label for="email" class="block text-sm font-medium text-gray-700">Candidate Email</label>
                <div class="mt-1">
                    <input type="email" name="email" id="email" required
                        class="block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm">
                </div>
            </div>

            <div class="sm:col-span-3">
                <label for="designation" class="block text-sm font-medium text-gray-700">Designation</label>
                <div class="mt-1">
                    <select id="designation" name="designation" required
                        class="block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm">
                        {% for value, label in designation_choices %}
                        <option value="{{ value }}">{{ label }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>

            <div class="sm:col-span-3">
                <label for="salary" class="block text-sm font-medium text-gray-700">Monthly Salary (INR)</label>
                <div class="mt-1">
                    <input type="number" name="salary" id="salary" min="0" step="0.01" required
                        class="block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm">
                </div>
            </div>

            <div class="sm:col-span-3">
                <label for="joining_date" class="block text-sm font-medium text-gray-700">Joining Date</label>
                <div class="mt-1">
                    <input type="date" name="joining_date" id="joining_date" required
                        class="block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm">
                </div>
            </div>
        </div>

        <div class="pt-5">
            <div class="flex justify-end">
                <a href="{% url 'letters:sub_admin_dashboard' %}"
                    class="bg-white py-2 px-4 border border-gray-300 rounded-md shadow-sm text-sm font-medium text-gray-700 hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500">
                    Cancel
                </a>
                <button type="submit" name="action" value="preview"
                    class="ml-3 inline-flex justify-center py-2 px-4 border border-gray-300 shadow-sm text-sm font-medium rounded-md text-gray-700 bg-white hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500">
                    Preview
                </button>
                <button type="submit" name="action" value="send"
                    class="ml-3 inline-flex justify-center py-2 px-4 border border-transparent shadow-sm text-sm font-medium rounded-md text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500">
                    Generate & Send
                </button>
            </div>
        </div>
    </form>
</div>
{% endblock %}
